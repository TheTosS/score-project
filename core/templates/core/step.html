{% load static %}
<link rel="stylesheet" href="{% static 'core/style.css' %}">

<div class="container">
    <h2>{{ question }}</h2>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="answer" placeholder="Введите ответ...">
        <input type="hidden" name="step" value="{{ step }}">
        <button type="submit">Далее</button>
    </form>
</div>
